<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Maker</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #38bdf8;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, #1f2937, #0b1020 50%, #05070f);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .card {
      width: min(720px, 100%);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(56, 189, 248, 0.1));
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.3px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      font-size: 16px;
    }
    input::placeholder {
      color: rgba(148, 163, 184, 0.75);
    }
    button {
      font-family: inherit;
    }
    .primary-btn {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b1020;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(34, 197, 94, 0.3);
    }
    .ghost-btn {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.12s ease, color 0.12s ease;
    }
    .ghost-btn:hover {
      border-color: rgba(56, 189, 248, 0.8);
      color: #7dd3fc;
    }
    .saved {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .saved-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .link-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }
    .link-list li {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(2, 6, 23, 0.6);
    }
    .link-list a {
      color: #7dd3fc;
      font-weight: 600;
      text-decoration: none;
      word-break: break-all;
    }
    .link-list a:hover {
      text-decoration: underline;
    }
    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    @media (max-width: 560px) {
      .row {
        grid-template-columns: 1fr;
      }
      .primary-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Link Maker</h1>
    <p>Paste any URL, then generate a clickable link.</p>
    <div class="row">
      <input id="linkInput" type="text" placeholder="https://example.com" autocomplete="off" />
      <button id="makeBtn" class="primary-btn" type="button">Make Link</button>
    </div>
    <section class="saved" aria-live="polite">
      <div class="saved-header">
        <span>Saved Links</span>
        <button id="clearBtn" class="ghost-btn" type="button">Clear All</button>
      </div>
      <ul id="linkList" class="link-list"></ul>
      <div id="emptyState" class="meta">No saved links yet.</div>
    </section>
    <div class="meta">Tip: press Enter in the input to generate the link.</div>
  </main>

  <script>
    const input = document.getElementById("linkInput");
    const button = document.getElementById("makeBtn");
    const list = document.getElementById("linkList");
    const emptyState = document.getElementById("emptyState");
    const clearBtn = document.getElementById("clearBtn");
    const STORAGE_KEY = "linkmaker.links";

    const ensureProtocol = (value) => {
      if (!value) return "";
      const trimmed = value.trim();
      return trimmed;
    };

    const loadLinks = () => {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return [];
        const parsed = JSON.parse(stored);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    };

    const saveLinks = (links) => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
      } catch (error) {
        // Ignore storage errors (private mode, quota, etc.).
      }
    };

    const renderList = () => {
      const links = loadLinks();
      list.innerHTML = "";

      if (!links.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      links.forEach((item) => {
        const li = document.createElement("li");
        const link = document.createElement("a");
        link.href = item.href;
        link.textContent = item.label;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        li.appendChild(link);
        list.appendChild(li);
      });
    };

    const renderLink = () => {
      const raw = input.value.trim();
      if (!raw) {
        return;
      }

      const href = ensureProtocol(raw);
      const links = loadLinks();
      links.unshift({ label: raw, href });
      saveLinks(links);
      renderList();
      input.value = "";
    };

    button.addEventListener("click", renderLink);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        renderLink();
      }
    });

    clearBtn.addEventListener("click", () => {
      saveLinks([]);
      renderList();
    });

    renderList();
  </script>
</body>
</html>
