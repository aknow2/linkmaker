<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Maker</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #38bdf8;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, #1f2937, #0b1020 50%, #05070f);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .card {
      width: min(720px, 100%);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(56, 189, 248, 0.1));
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.3px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      font-size: 16px;
    }
    input::placeholder {
      color: rgba(148, 163, 184, 0.75);
    }
    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b1020;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(34, 197, 94, 0.3);
    }
    .output {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.65);
      border: 1px dashed rgba(148, 163, 184, 0.4);
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
    }
    .output a {
      color: #7dd3fc;
      font-weight: 600;
      text-decoration: none;
    }
    .output a:hover {
      text-decoration: underline;
    }
    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    @media (max-width: 560px) {
      .row {
        grid-template-columns: 1fr;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Link Maker</h1>
    <p>Paste any URL, then generate a clickable link.</p>
    <div class="row">
      <input id="linkInput" type="text" placeholder="https://example.com" autocomplete="off" />
      <button id="makeBtn" type="button">Make Link</button>
    </div>
    <div id="output" class="output" aria-live="polite">
      <span class="meta">Your link will appear here.</span>
    </div>
    <div class="meta">Tip: press Enter in the input to generate the link.</div>
  </main>

  <script>
    const input = document.getElementById("linkInput");
    const output = document.getElementById("output");
    const button = document.getElementById("makeBtn");

    const ensureProtocol = (value) => {
      if (!value) return "";
      const trimmed = value.trim();
      return trimmed;
    };

    const renderLink = () => {
      const raw = input.value.trim();
      output.innerHTML = "";

      if (!raw) {
        const msg = document.createElement("span");
        msg.className = "meta";
        msg.textContent = "Please enter a URL.";
        output.appendChild(msg);
        return;
      }

      const href = ensureProtocol(raw);
      const link = document.createElement("a");
      link.href = href;
      link.textContent = raw;
      link.target = "_blank";
      link.rel = "noopener noreferrer";

      output.appendChild(link);
    };

    button.addEventListener("click", renderLink);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        renderLink();
      }
    });
  </script>
</body>
</html>
